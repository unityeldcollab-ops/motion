                                                <div className="text-sm text-slate-900 dark:text-slate-100 font-bold">{log.time}</div>
                                                <div className="font-mono text-[10px] text-slate-400 dark:text-slate-500 mt-1">{log.id}</div>
                                              </td>
                                              <td className="px-6 py-5 align-top">
                                                 <div className="text-sm font-semibold text-slate-800 dark:text-slate-200">{log.companyName}</div>
                                                 {log.timeSpent && (
                                                   <div className="mt-2 flex items-center gap-1.5 text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">
                                                      <Icons.Clock size={12} className="text-slate-400"/> Затрачено: {log.timeSpent}
                                                   </div>
                                                 )}
                                              </td>
                                              <td className="px-6 py-5 align-top">
                                                <div className="flex items-center justify-between bg-white dark:bg-slate-950 p-4 rounded-xl ring-1 ring-slate-200 dark:ring-slate-800 cursor-pointer hover:ring-slate-300 dark:hover:ring-slate-700 transition-all shadow-sm" onClick={() => togglePatrolHistory(log.id)}>
                                                  <span className="text-[11px] font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                                                    Готово: {log.stats.checked} / {log.stats.total} 
                                                    <span className="text-slate-600 dark:text-slate-300 ml-2 bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-md">{log.stats.percent}%</span>
                                                    {log.stats.inactive > 0 && <span className="ml-1 text-slate-400 dark:text-slate-500 font-medium">[{log.stats.inactive} отгул]</span>}
                                                  </span>
                                                  {expandedPatrols[log.id] ? <Icons.ChevronUp size={16} className="text-slate-400"/> : <Icons.ChevronDown size={16} className="text-slate-400"/>}
                                                </div>
                                                {expandedPatrols[log.id] && (
                                                  <div className="flex flex-col gap-2 mt-3 pl-2 border-l-2 border-slate-200 dark:border-slate-800">
                                                    {log.actions.map((act, i) => (
                                                      <div key={i} className={`text-xs p-3 rounded-xl ring-1 shadow-sm ${act.fixes.includes('В отгуле / Не работает') ? 'ring-slate-200 dark:ring-slate-800 opacity-60 bg-slate-50 dark:bg-slate-900/50' : 'ring-slate-200 dark:ring-slate-800 bg-white dark:bg-slate-950'}`}>
                                                        <span className="font-bold text-slate-900 dark:text-slate-100 block mb-2 text-[11px]">{act.driverName}</span>
                                                        <div className="flex flex-wrap gap-1.5">
                                                           {act.fixes.map((f, j) => <span key={j} className="text-[10px] font-semibold px-2 py-1 rounded border bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-800">{f}</span>)}
                                                        </div>
                                                      </div>
                                                    ))}
                                                  </div>
                                                )}
                                              </td>
                                            </tr>
                                         ))}
                                       </React.Fragment>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            )}
                          </div>

                          <div className="w-full bg-white dark:bg-slate-900 rounded-3xl ring-1 ring-slate-200 dark:ring-slate-800 shadow-sm flex flex-col overflow-hidden transition-all pb-4">
                            <div 
                              className="bg-slate-50/80 dark:bg-slate-800/30 p-6 border-b border-slate-200 dark:border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center cursor-pointer hover:bg-slate-100/80 dark:hover:bg-slate-800/50 transition-colors gap-4"
                              onClick={() => setIsRequestsHistoryOpen(!isRequestsHistoryOpen)}
                            >
                              <h2 className="text-sm font-bold text-slate-900 dark:text-white uppercase tracking-widest flex items-center gap-2">
                                 <div className="p-1.5 bg-emerald-100 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 rounded-lg"><Icons.CheckCircle size={16} /></div>
                                 Обработанные обращения
                              </h2>
                              <div className="flex items-center gap-3">
                                 <span className="text-[10px] font-bold text-emerald-700 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-500/10 px-4 py-2 rounded-lg ring-1 ring-emerald-200 dark:ring-emerald-500/20 shadow-sm flex items-center gap-1.5 uppercase tracking-widest">
                                    Всего обработано: <span className="text-sm">{totalRequestsCount}</span>
                                 </span>
                                 <div className="p-1 bg-white dark:bg-slate-800 rounded-lg ring-1 ring-slate-200 dark:ring-slate-700 ml-2">
                                   {isRequestsHistoryOpen ? <Icons.ChevronUp size={18} className="text-slate-500"/> : <Icons.ChevronDown size={18} className="text-slate-500"/>}
                                 </div>
                              </div>
                            </div>
                            
                            {isRequestsHistoryOpen && (
                              <div className="p-6 bg-transparent">
                                <div className="flex flex-col gap-8">
                                   {requestsByDate.map(group => {
                                      const isCollapsed = collapsedRequestsDates[group.date];
                                      return (
                                        <div key={group.date} className="flex flex-col bg-white dark:bg-slate-950 rounded-2xl ring-1 ring-slate-200 dark:ring-slate-800 shadow-sm overflow-hidden">
                                          <div
                                            className="bg-slate-50/50 dark:bg-slate-900/50 px-6 py-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                            onClick={() => toggleRequestsDate(group.date)}
                                          >
                                            <h3 className="text-sm font-bold text-slate-800 dark:text-slate-200 uppercase tracking-widest flex items-center gap-2">
                                              <Icons.Clock size={16} className="text-slate-400" />
                                              {group.date}
                                              <span className="text-[10px] bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400 ring-1 ring-emerald-200 dark:ring-emerald-500/20 px-2 py-0.5 rounded-md ml-3 shadow-sm">
                                                {group.items.length} записей
                                              </span>
                                            </h3>
                                            {isCollapsed ? <Icons.ChevronDown size={18} className="text-slate-400"/> : <Icons.ChevronUp size={18} className="text-slate-400"/>}
                                          </div>

                                          {!isCollapsed && (
                                            <div className="p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
                                               <div className="flex flex-col gap-4">
                                                  <h4 className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest border-b border-slate-200 dark:border-slate-800 pb-3 flex items-center gap-2">
                                                     <div className="p-1 bg-indigo-50 text-indigo-500 dark:bg-indigo-500/20 rounded"><Icons.MessageSquare size={14} /></div> Сообщения
                                                  </h4>
                                                  <div className="flex flex-col gap-3">
                                                     {group.items.filter(log => log.type === 'message').map(log => <HistoryCard key={log.id} log={log} />)}
                                                     {group.items.filter(log => log.type === 'message').length === 0 && <span className="text-xs text-slate-400 italic">Нет записей</span>}
                                                  </div>
                                               </div>
                                               <div className="flex flex-col gap-4">
                                                  <h4 className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest border-b border-slate-200 dark:border-slate-800 pb-3 flex items-center gap-2">
                                                     <div className="p-1 bg-blue-50 text-blue-500 dark:bg-blue-500/20 rounded"><Icons.Shield size={14} /></div> Правки
                                                  </h4>
                                                  <div className="flex flex-col gap-3">
                                                     {group.items.filter(log => log.type === 'patrol_fix').map(log => <HistoryCard key={log.id} log={log} />)}
                                                     {group.items.filter(log => log.type === 'patrol_fix').length === 0 && <span className="text-xs text-slate-400 italic">Нет записей</span>}
                                                  </div>
                                               </div>
                                               <div className="flex flex-col gap-4">
                                                  <h4 className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest border-b border-slate-200 dark:border-slate-800 pb-3 flex items-center gap-2">
                                                     <div className="p-1 bg-emerald-50 text-emerald-500 dark:bg-emerald-500/20 rounded"><Icons.Phone size={14} /></div> Звонки
                                                  </h4>
                                                  <div className="flex flex-col gap-3">
                                                     {group.items.filter(log => log.type === 'call').map(log => <HistoryCard key={log.id} log={log} />)}
                                                     {group.items.filter(log => log.type === 'call').length === 0 && <span className="text-xs text-slate-400 italic">Нет записей</span>}
                                                  </div>
                                               </div>
                                            </div>
                                          )}
                                        </div>
                                      );
                                   })}
                                </div>
                              </div>
                            )}
                          </div>
                        </div>
                      )}

                      {shiftState === 'Active' && activeTab === 'workspace' && (
                        <>
                          {(activePatrol || activeRequests.length > 0) && (
                            <div className="w-full max-w-7xl mx-auto flex flex-col md:flex-row md:items-start justify-between gap-4 mb-8">
                              <div className="flex flex-wrap gap-3">
                                {activePatrol && (
                                   <button onClick={() => handleSwitchWorkspace('patrol')} className={`px-5 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest flex items-center gap-2.5 transition-all active:scale-95 ${activeWorkspaceView === 'patrol' ? 'bg-blue-600 text-white shadow-md shadow-blue-500/20' : 'bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 ring-1 ring-slate-200 dark:ring-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 shadow-sm'}`}>
                                      <Icons.Activity size={16} className={activeWorkspaceView === 'patrol' ? 'text-white' : 'text-blue-500'}/> Обход: {activePatrol.company.name}
                                   </button>
                                )}
                                {activeRequests.map(req => (
                                   <button key={req.id} onClick={() => handleSwitchWorkspace('request', req.id)} className={`px-5 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest flex items-center gap-3 transition-all active:scale-95 ${activeWorkspaceView === 'request' && currentRequestId === req.id ? (req.type === 'message' ? 'bg-indigo-600 text-white shadow-md shadow-indigo-500/20' : 'bg-emerald-600 text-white shadow-md shadow-emerald-500/20') : 'bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 ring-1 ring-slate-200 dark:ring-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 shadow-sm'}`}>
                                      {req.type === 'message' ? <Icons.MessageSquare size={18} className={activeWorkspaceView === 'request' && currentRequestId === req.id ? 'text-indigo-200' : 'text-indigo-500'}/> : <Icons.Phone size={18} className={activeWorkspaceView === 'request' && currentRequestId === req.id ? 'text-emerald-200' : 'text-emerald-500'}/>}
                                      <div className="flex flex-col items-start leading-tight">
                                         <span>{req.driver.name.split(' ')[0]}</span>
                                         <span className="text-[10px] font-mono opacity-80 mt-1 flex items-center gap-1 normal-case tracking-normal">
                                             {new Date(req.startTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                             <span className="opacity-50 mx-0.5">•</span>
                                             <RequestTimer startTime={req.startTime} isEnded={false} />
                                         </span>
                                      </div>
                                      {req.actions.length > 0 && <Icons.CheckCircle size={14} className={`${activeWorkspaceView === 'request' && currentRequestId === req.id ? 'text-white' : 'text-emerald-500'} ml-2 shrink-0`} />}
                                   </button>
                                ))}
                              </div>
                              <div className="flex shrink-0">
                                 <button onClick={handleToggleBreak} className="px-6 py-3 bg-amber-50 dark:bg-amber-500/10 hover:bg-amber-100 dark:hover:bg-amber-500/20 text-amber-700 dark:text-amber-500 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all shadow-sm ring-1 ring-amber-200/50 dark:ring-amber-500/20 flex items-center gap-2.5 active:scale-95">
                                   <Icons.Coffee size={16} /> На перерыв
                                 </button>
                              </div>
                            </div>
                          )}

                          {activeWorkspaceView === 'idle' && (
                            <div className="w-full max-w-6xl mx-auto mt-4">
                              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                                <div>
                                  <h2 className="text-2xl font-bold text-slate-900 dark:text-white tracking-tight">Панель управления</h2>
                                  <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">Выберите автопарк для проведения планового обхода</p>
                                </div>
                                <div className="flex flex-wrap items-center gap-3">
                                  <div className="relative">
                                     <Icons.Search className="absolute left-3.5 top-3 text-slate-400" size={16} />
                                     <input 
                                       placeholder="Поиск компании..." 
                                       value={companySearch} 
                                       onChange={(e) => setCompanySearch(e.target.value)} 
                                       className="pl-10 pr-4 py-2.5 w-48 lg:w-64 bg-white dark:bg-slate-900 ring-1 ring-slate-200 dark:ring-slate-800 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 dark:text-slate-200 shadow-sm transition-all" 
                                     />
                                  </div>
                                  <button onClick={handleEndShift} className="bg-slate-800 hover:bg-slate-900 text-white dark:bg-slate-700 dark:hover:bg-slate-600 px-6 py-2.5 rounded-xl font-bold text-xs uppercase tracking-widest transition-colors shadow-sm active:scale-95">
                                    Завершить смену
                                  </button>
                                </div>
                              </div>

                              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                {myCompanies.map(company => {
                                   const companyPatrols = currentShiftPatrols.filter(p => p.companyName === company.name);
                                   const patrolCount = companyPatrols.length;
                                   
                                   const prog = patrolProgress[company.id] || { rounds: 0, data: {} };
                                   const companyDriversCount = driversList.filter(d => d.companyId === company.id).length;
                                   const checkedCount = Object.values(prog.data).filter(d => d.completed || d.inactive).length;
                                   const progressPercent = companyDriversCount > 0 ? Math.round((checkedCount / companyDriversCount) * 100) : 0;
                                   
                                   const totalRounds = prog.rounds + (progressPercent === 100 ? 1 : 0);
                                   
                                   let cardState = 'unstarted';
                                   if (progressPercent > 0 && progressPercent < 100) cardState = 'partial';
                                   if (progressPercent === 100) cardState = 'completed';

                                   const borderColors = {
                                       unstarted: 'ring-slate-200 dark:ring-slate-800',
                                       partial: 'ring-amber-200 dark:ring-amber-500/30 bg-amber-50/10 dark:bg-amber-900/10 shadow-[0_0_15px_rgba(245,158,11,0.05)]',
                                       completed: 'ring-emerald-200 dark:ring-emerald-500/30 bg-emerald-50/10 dark:bg-emerald-900/10 shadow-[0_0_15px_rgba(16,185,129,0.05)]'
                                   };

                                   const iconColors = {
                                       unstarted: 'bg-gradient-to-br from-blue-100 to-blue-200 text-blue-700 dark:from-blue-900 dark:to-blue-800 dark:text-blue-300 ring-1 ring-white/50 dark:ring-white/10',
                                       partial: 'bg-gradient-to-br from-amber-100 to-amber-200 text-amber-700 dark:from-amber-900 dark:to-amber-800 dark:text-amber-300 ring-1 ring-white/50 dark:ring-white/10',
                                       completed: 'bg-gradient-to-br from-emerald-100 to-emerald-200 text-emerald-700 dark:from-emerald-900 dark:to-emerald-800 dark:text-emerald-300 ring-1 ring-white/50 dark:ring-white/10'
                                   };

                                   const buttonColors = {
                                       unstarted: 'bg-white dark:bg-slate-800 hover:bg-blue-600 hover:text-white dark:hover:bg-blue-600 text-slate-700 dark:text-slate-200 ring-1 ring-slate-200 dark:ring-slate-700 hover:ring-transparent shadow-sm',
                                       partial: 'bg-amber-500 hover:bg-amber-600 text-white shadow-md shadow-amber-500/20',
                                       completed: 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-md shadow-emerald-500/20'
                                   };
                                   
                                   return (
                                     <div key={company.id} className={`bg-white dark:bg-slate-900 p-6 rounded-3xl ring-1 transition-all duration-300 group flex flex-col hover:shadow-soft relative overflow-hidden ${borderColors[cardState]}`}>
                                       {cardState === 'completed' && <div className="absolute top-0 left-0 right-0 h-1 bg-emerald-500"></div>}
                                       {cardState === 'partial' && <div className="absolute top-0 left-0 right-0 h-1 bg-amber-500"></div>}
                                       
                                       <div className="flex justify-between items-start mb-5">
                                          <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-bold text-xl shadow-inner ${iconColors[cardState]}`}>
                                            {company.name.charAt(0)}
                                          </div>
                                          <div className="flex flex-col items-end gap-1.5">
                                             <span className="bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-[10px] font-bold px-3 py-1.5 rounded-full uppercase tracking-wider ring-1 ring-slate-200 dark:ring-slate-700 shadow-sm">
                                               {company.id}
                                             </span>
                                          </div>
                                       </div>
                                       <h3 className="text-lg font-bold text-slate-900 dark:text-white mb-2 truncate tracking-tight" title={company.name}>{company.name}</h3>
                                       
                                       {(cardState === 'partial' || cardState === 'completed') && (
                                           <div className="mb-4 mt-2">
                                                <div className={`text-[10px] font-bold px-3 py-1.5 rounded-lg ring-1 shadow-sm inline-flex items-center gap-1.5 ${cardState === 'completed' ? 'text-emerald-700 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-500/10 ring-emerald-200 dark:ring-emerald-500/20' : 'text-amber-700 dark:text-amber-400 bg-amber-50 dark:bg-amber-500/10 ring-amber-200 dark:ring-amber-500/20'}`}>
                                                    <Icons.CheckCircle size={12}/> 
                                                    {cardState === 'completed' ? `Завершен (${totalRounds} раз)` : `В процессе: ${progressPercent}%`}
                                                </div>
                                           </div>
                                       )}
                                       
                                       <p className="text-sm text-slate-500 dark:text-slate-400 mb-8 flex items-center gap-2 font-medium mt-auto pt-4">
                                          <Icons.Users size={16} className="text-slate-400 dark:text-slate-500"/> {company.fleetSize} водителей (траков)
                                       </p>
                                       <button 
                                         onClick={() => startPatrolDirectly(company.id, cardState === 'completed')} 
                                         className={`mt-auto w-full py-3.5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all flex items-center justify-center gap-2 active:scale-[0.98] ${buttonColors[cardState]}`}
                                       >
                                         <Icons.Activity size={16} /> 
                                         {cardState === 'unstarted' ? 'Начать обход' : cardState === 'partial' ? 'Продолжить обход' : 'Повторный обход'}
                                       </button>
                                     </div>
                                   )
                                })}
                                {myCompanies.length === 0 && (
                                    <div className="col-span-full py-16 text-center flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-900 rounded-3xl ring-1 ring-slate-200 dark:ring-slate-800 shadow-sm">
                                       <Icons.Search size={32} className="text-slate-300 dark:text-slate-600 mb-3" />
                                       <p>{companySearch ? `Ничего не найдено по запросу "${companySearch}"` : 'У вас нет назначенных компаний. Перейдите в раздел "Компании", чтобы взять автопарк на обход.'}</p>
                                    </div>
                                )}
                              </div>
                            </div>
                          )}

                          {activeWorkspaceView === 'request' && currentReq && (
                            <div className="w-full max-w-4xl mx-auto flex flex-col bg-white dark:bg-slate-900 rounded-3xl ring-1 ring-slate-200 dark:ring-slate-800 shadow-2xl self-start transition-all overflow-hidden">
                              
                              <div className={`p-8 text-white shrink-0 relative overflow-hidden ${currentReq.type === 'message' ? 'bg-gradient-to-br from-indigo-600 to-indigo-800' : 'bg-gradient-to-br from-emerald-500 to-emerald-700'}`}>
                                <div className="absolute top-0 right-0 p-8 opacity-10">
                                   {currentReq.type === 'message' ? <Icons.MessageSquare size={120} /> : <Icons.Phone size={120} />}
                                </div>
                                <div className="flex justify-between items-start relative z-10">
                                  <div>
                                    <div className="text-white/70 font-mono text-[11px] mb-3 tracking-wider flex items-center gap-2">
                                       {currentReq.id} 
                                       <span>|</span> 
                                       <span className="font-bold text-white uppercase tracking-widest">{currentReq.type === 'message' ? 'СООБЩЕНИЕ ИЗ ЧАТА' : 'ВХОДЯЩИЙ ЗВОНОК'}</span>
                                    </div>
                                    <div className="flex items-center gap-3 mb-3">
                                       <h2 className="text-3xl font-extrabold tracking-tight drop-shadow-sm">{currentReq.driver.name}</h2>
                                       {currentReq.driver.requiresApproval && <Icons.AlertTriangle size={24} className="text-amber-300 drop-shadow-md" title="Требует согласования" />}
                                    </div>
                                    <div className="text-white/90 text-sm font-medium flex items-center gap-2 mt-4">
                                        <span className="bg-black/20 px-3 py-1.5 rounded-lg ring-1 ring-white/10 backdrop-blur-md">{currentReq.driver.company}</span>
                                        <span className="bg-black/20 px-3 py-1.5 rounded-lg ring-1 ring-white/10 backdrop-blur-md font-mono">{currentReq.driver.truck}</span>
                                    </div>
                                    {currentReq.driver.requiresApproval && (
                                        <div className="mt-5 text-[11px] font-bold text-amber-900 uppercase tracking-widest bg-amber-400 inline-block px-4 py-3 rounded-xl shadow-lg ring-1 ring-amber-300">
                                            <div className="flex items-center gap-1.5"><Icons.AlertTriangle size={14} /> Действия только по согласованию</div>
                                            {currentReq.driver.approvalNote && (
                                                <div className="mt-2 text-xs font-semibold text-amber-900/90 normal-case tracking-normal border-t border-amber-500/30 pt-2">
                                                    {currentReq.driver.approvalNote}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                  </div>
                                  
                                  {/* БЛОК ТАЙМЕРА ДЛЯ ЗВОНКА */}
                                  {currentReq.type === 'call' && currentReq.callStatus === 'ongoing' ? (
                                      <div className="flex flex-col items-end gap-3">
                                         <span className="px-5 py-3 text-sm font-bold uppercase tracking-widest bg-rose-500/20 ring-1 ring-rose-500/50 rounded-xl shadow-sm backdrop-blur-md text-rose-50 flex items-center gap-3">
                                            <span className="w-2.5 h-2.5 rounded-full bg-rose-400 animate-pulse"></span>
                                            ИДЕТ РАЗГОВОР <CallTimer startTime={currentReq.callStartTime} />
                                         </span>
                                         <button onClick={() => handleStopCall(currentReq.id)} className="bg-rose-600 hover:bg-rose-500 text-white px-5 py-3 rounded-xl text-xs font-bold uppercase tracking-widest transition-all shadow-lg active:scale-95 flex items-center gap-2">
                                            <Icons.PhoneOff size={16} /> ЗАВЕРШИТЬ ЗВОНОК
                                         </button>
                                      </div>
                                  ) : currentReq.type === 'call' && currentReq.callStatus === 'ended' ? (
                                      <span className="px-5 py-3 text-sm font-bold uppercase tracking-widest bg-black/20 ring-1 ring-white/20 rounded-xl shadow-sm backdrop-blur-md text-white flex items-center gap-3">

                                    const checkedCount = completedDrivers.length;

                                                        </button>

                                                      {isSensitive && (
                                                        <div className="mt-4 text-[10px] font-bold text-amber-800 dark:text-amber-400 uppercase tracking-widest bg-amber-100/50 dark:bg-amber-500/10 p-3 rounded-xl ring-1 ring-amber-200 dark:ring-amber-500/20">
                                                            <div className="flex items-center gap-1.5"><Icons.AlertTriangle size={12}/> Только по согласованию</div>

                                                                  {driver.approvalNote}
                                                              </div>
                                                            )}
                                                        </div>
                                                      )}
                                                    </div>
                                                 </div>
                                               )
                                             })}
                                           </div>
                                        ) : (

                                             <Icons.CheckCircle size={48} className="mx-auto text-slate-300 dark:text-slate-700 mb-4" />

                                           </div>

                                        {totalPages > 1 && searchedUncompletedDrivers.length > 0 && itemsPerPage !== 'All' && (
                                          <div className="flex items-center justify-center gap-2 mt-10 border-t border-slate-200 dark:border-slate-800 pt-8">
                                             <button onClick={() => setPatrolCurrentPage(p => Math.max(1, p - 1))} disabled={safeCurrentPage === 1} className="px-5 py-2.5 ring-1 ring-slate-200 dark:ring-slate-800 rounded-xl text-[11px] font-bold uppercase tracking-wider disabled:opacity-50 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Назад</button>
                                             <div className="flex items-center gap-1 mx-2">
                                                {Array.from({ length: totalPages }).map((_, i) => (
                                                    <button key={i} onClick={() => setPatrolCurrentPage(i + 1)} className={`w-10 h-10 rounded-xl text-xs font-bold ring-1 transition-all ${safeCurrentPage === i + 1 ? 'bg-blue-600 text-white ring-blue-600 shadow-md shadow-blue-500/20' : 'bg-white dark:bg-slate-900 ring-slate-200 dark:ring-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>{i + 1}</button>

                                             </div>
                                             <button onClick={() => setPatrolCurrentPage(p => Math.min(totalPages, p + 1))} disabled={safeCurrentPage === totalPages} className="px-5 py-2.5 ring-1 ring-slate-200 dark:ring-slate-800 rounded-xl text-[11px] font-bold uppercase tracking-wider disabled:opacity-50 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Вперед</button>

                                        {checkedCount > 0 && (
                                          <div className="mt-14 animate-in slide-in-from-bottom-4 duration-500">
                                            <div className="flex items-center justify-between cursor-pointer group bg-emerald-50/50 dark:bg-emerald-500/5 p-6 rounded-3xl ring-1 ring-emerald-200/50 dark:ring-emerald-500/20 mb-6 hover:bg-emerald-50 dark:hover:bg-emerald-500/10 transition-colors shadow-sm" onClick={() => setCheckedSectionOpen(!checkedSectionOpen)}>
                                               <h3 className="text-sm font-bold text-emerald-800 dark:text-emerald-400 uppercase tracking-widest flex items-center gap-3">
                                                 <Icons.CheckCircle size={20}/> Проверено: {checkedCount} / {activeTotal} 
                                                 <span className="ml-3 text-xs bg-white dark:bg-slate-900 ring-1 ring-emerald-200 dark:ring-emerald-500/30 px-3 py-1 rounded-lg shadow-sm text-emerald-700 dark:text-emerald-400">{activeTotal > 0 ? Math.round((checkedCount / activeTotal) * 100) : 100}%</span>
                                               </h3>
                                               <div className="p-2 bg-white dark:bg-slate-900 rounded-xl ring-1 ring-emerald-100 dark:ring-emerald-500/20 shadow-sm group-hover:scale-105 transition-transform">
                                                  {checkedSectionOpen ? <Icons.ChevronUp size={18} className="text-emerald-600 dark:text-emerald-500"/> : <Icons.ChevronDown size={18} className="text-emerald-600 dark:text-emerald-500"/>}
                                               </div>
                                            </div>
                                            {checkedSectionOpen && (
                                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                                   {completedDrivers.map(driver => (
                                                     <div key={`comp-${driver.id}`} className="p-5 bg-white dark:bg-slate-900 ring-1 ring-slate-200 dark:ring-slate-800 rounded-2xl flex justify-between items-start shadow-sm hover:ring-slate-300 dark:hover:ring-slate-600 transition-all group">
                                                        <div className="min-w-0">
                                                          <div className="font-bold text-xs text-slate-900 dark:text-slate-100 truncate flex items-center gap-2 mb-2">
                                                             <span className="truncate">{driver.name}</span>
                                                             <button onClick={(e) => handleCopyName(e, driver.name)} className="text-slate-400 hover:text-blue-500 transition-colors shrink-0" title="Скопировать имя">
                                                                {copiedDriver === driver.name ? <Icons.CheckCircle size={14} className="text-emerald-500"/> : <Icons.Copy size={14}/>}
                                                             </button>
                                                             {driver.requiresApproval && <Icons.AlertTriangle size={14} className="text-amber-500 shrink-0" />}
                                                          </div>
                                                          <div className="flex flex-wrap gap-2 mt-3">
                                                             {patrolData[driver.id]?.fixes.map((f, i) => <span key={i} className="text-[10px] px-2.5 py-1 rounded-md ring-1 bg-slate-50 dark:bg-slate-800/50 text-slate-600 dark:text-slate-400 ring-slate-200 dark:ring-slate-700 font-semibold">{f}</span>)}
                                                          </div>
                                                        </div>
                                                        <button onClick={() => setPatrolData(prev => ({...prev, [driver.id]: {...prev[driver.id], completed: false, selected: true}}))} className="text-slate-400 hover:text-slate-900 dark:hover:text-white shrink-0 ml-4 bg-slate-50 dark:bg-slate-800 p-2 rounded-xl ring-1 ring-slate-200 dark:ring-slate-700 shadow-sm transition-all hover:scale-105 active:scale-95" title="Вернуть в очередь"><Icons.History size={16}/></button>
                                                     </div>
                                                   ))}
                                                </div>
                                            )}
                                          </div>
                                        )}

                                        {inactiveCount > 0 && (
                                          <div className="mt-8">
                                            <div className="flex items-center justify-between cursor-pointer group bg-slate-100/50 dark:bg-slate-800/30 p-5 rounded-3xl ring-1 ring-slate-200 dark:ring-slate-800 mb-6 hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors shadow-sm" onClick={() => setInactiveSectionOpen(!inactiveSectionOpen)}>
                                               <h3 className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest flex items-center gap-3"><Icons.Moon size={18}/> Неактивные / В отгуле: <span className="bg-white dark:bg-slate-900 px-2 py-0.5 rounded-lg ring-1 ring-slate-200 dark:ring-slate-700">{inactiveCount}</span></h3>
                                               <div className="p-2 bg-white dark:bg-slate-900 rounded-xl ring-1 ring-slate-200 dark:ring-slate-700 shadow-sm">
                                                  {inactiveSectionOpen ? <Icons.ChevronUp size={18} className="text-slate-400"/> : <Icons.ChevronDown size={18} className="text-slate-400"/>}
                                               </div>
                                            </div>
                                            {inactiveSectionOpen && (
                                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4">
                                                   {inactiveDrivers.map(driver => (
                                                     <div key={`inact-${driver.id}`} className="p-4 bg-slate-50 dark:bg-slate-900/50 ring-1 ring-slate-200 dark:ring-slate-800/80 rounded-2xl flex justify-between items-center opacity-60 hover:opacity-100 transition-opacity group">
                                                        <div className="font-semibold text-xs text-slate-500 dark:text-slate-400 line-through truncate flex items-center gap-2">
                                                          <span className="truncate">{driver.name}</span>
                                                          <button onClick={(e) => handleCopyName(e, driver.name)} className="text-slate-400 hover:text-blue-500 transition-colors shrink-0" title="Скопировать имя">
                                                            {copiedDriver === driver.name ? <Icons.CheckCircle size={14} className="text-emerald-500"/> : <Icons.Copy size={14}/>}
                                                          </button>
                                                        </div>
                                                        <button onClick={() => setPatrolData(prev => ({...prev, [driver.id]: {...prev[driver.id], inactive: false, selected: true}}))} className="text-slate-400 hover:text-slate-900 dark:hover:text-white ml-4 bg-white dark:bg-slate-800 p-2 rounded-xl ring-1 ring-slate-200 dark:ring-slate-700 shadow-sm transition-transform hover:scale-105 active:scale-95"><Icons.History size={16}/></button>
                                                     </div>
                                                   ))}
                                                </div>
                                            )}
                                          </div>
                                        )}

                                      </div>
                                    )
                                  })()}
                                  {showAntiFraudAlert && <div className="bg-rose-50 dark:bg-rose-500/10 ring-1 ring-rose-200 dark:ring-rose-500/20 p-5 rounded-2xl text-sm text-rose-800 dark:text-rose-200 font-bold shadow-sm flex items-center gap-3 mt-6 animate-in fade-in slide-in-from-bottom-2"><Icons.AlertTriangle size={24}/> {antiFraudAlertMsg}</div>}
                                </div>
                                
                                <div className="bg-slate-100/50 dark:bg-slate-950/50 p-6 border-t border-slate-200 dark:border-slate-800 flex gap-4 shrink-0 backdrop-blur-xl">
                                  <button onClick={() => { setActivePatrol(null); setPatrolData({}); setPatrolDriverSearch(''); setActiveWorkspaceView(activeRequests.length > 0 ? 'request' : 'idle'); }} className="px-8 py-4 ring-1 ring-inset ring-slate-300 dark:ring-slate-700 text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-900 rounded-xl text-[11px] font-bold uppercase tracking-widest hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors shadow-sm active:scale-95">ОТМЕНИТЬ ОБХОД</button>
                                  <button onClick={handleEndPatrol} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-[11px] font-bold uppercase tracking-widest transition-all shadow-md active:scale-[0.98]">ЗАВЕРШИТЬ ОБХОД И СОХРАНИТЬ</button>
                                </div>
                              </div>
                            </div>
                          )}

                        </>
                      )}

                    </main>

                    {/* ПРАВАЯ ПАНЕЛЬ (СВОДКА - SIDEBAR) */}
                    <div className={`${rightSidebarOpen ? 'w-80' : 'w-0'} bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-l border-slate-200/60 dark:border-slate-800/60 flex flex-col shrink-0 transition-all duration-300 overflow-hidden z-20`}>
                      <div className="w-80 h-full flex flex-col p-6 overflow-y-auto custom-scrollbar">
                         <h2 className="text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-6 mt-2 flex items-center gap-2"><Icons.BarChart2 size={16}/> Сводка за смену</h2>
                         
                         <div className="space-y-4">
                             <div className="bg-blue-50 dark:bg-blue-500/10 p-6 rounded-3xl ring-1 ring-blue-100 dark:ring-blue-500/20 shadow-sm flex items-center justify-between relative overflow-hidden group">
                                <div className="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/4 opacity-10 group-hover:scale-110 transition-transform duration-500"><Icons.Activity size={100}/></div>
                                <div className="relative z-10">
                                   <div className="text-[10px] uppercase font-bold tracking-widest text-blue-600 dark:text-blue-400 mb-1">Прогресс обходов</div>
                                   <div className="text-4xl font-black text-blue-700 dark:text-blue-300 flex items-baseline gap-2">
                                       {basePatrolPercent}%
                                       {bonusPatrolPercent > 0 && <span className="text-lg font-bold text-emerald-500 bg-emerald-50 dark:bg-emerald-500/20 px-2 rounded-lg">+{bonusPatrolPercent}%</span>}
                                   </div>
                                </div>
                             </div>

                             <div className="grid grid-cols-2 gap-4">
                               <div className="bg-indigo-50 dark:bg-indigo-500/10 p-5 rounded-3xl ring-1 ring-indigo-100 dark:ring-indigo-500/20 shadow-sm flex flex-col justify-center relative overflow-hidden group">
                                  <div className="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform duration-500"><Icons.MessageSquare size={80}/></div>
                                  <div className="relative z-10">
                                     <div className="text-[10px] uppercase font-bold tracking-widest text-indigo-600 dark:text-indigo-400 mb-1">Сообщения</div>
                                     <div className="text-3xl font-black text-indigo-700 dark:text-indigo-300">{messagesCount}</div>
                                  </div>
                               </div>

                               <div className="bg-emerald-50 dark:bg-emerald-500/10 p-5 rounded-3xl ring-1 ring-emerald-100 dark:ring-emerald-500/20 shadow-sm flex flex-col justify-center relative overflow-hidden group">
                                  <div className="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform duration-500"><Icons.Phone size={80}/></div>
                                  <div className="relative z-10">
                                     <div className="text-[10px] uppercase font-bold tracking-widest text-emerald-600 dark:text-emerald-400 mb-1">Звонки</div>
                                     <div className="text-3xl font-black text-emerald-700 dark:text-emerald-300">{callsCount}</div>
                                  </div>
                               </div>
                             </div>

                             <div className="bg-slate-100 dark:bg-slate-800/50 p-6 rounded-3xl ring-1 ring-slate-200 dark:ring-slate-700 shadow-sm flex items-center justify-between relative overflow-hidden group mt-4">
                                <div className="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/4 opacity-[0.03] dark:opacity-10 group-hover:scale-110 transition-transform duration-500"><Icons.Shield size={100}/></div>
                                <div className="relative z-10">
                                   <div className="text-[10px] uppercase font-bold tracking-widest text-slate-500 dark:text-slate-400 mb-1">Правки логбука</div>
                                   <div className="text-4xl font-black text-slate-700 dark:text-slate-200">{fixesCount}</div>
                                </div>
                             </div>
                         </div>
                      </div>
                    </div>

                    {/* ПЛАВАЮЩАЯ КНОПКА (FAB) ДЛЯ НОВОГО ОБРАЩЕНИЯ */}
                    {shiftState === 'Active' && activeTab === 'workspace' && (
                      <button
                        onClick={() => setShowNewRequestModal(true)}
                        style={{ right: rightSidebarOpen ? '22rem' : '3rem' }}
                        className={`absolute bottom-8 w-16 h-16 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-[0_8px_30px_rgb(37,99,235,0.3)] flex items-center justify-center transform hover:scale-105 active:scale-95 transition-all duration-300 z-40 group ring-4 ring-white/50 dark:ring-slate-900/50`}
                        title="Новое обращение"
                      >
                        <Icons.Plus size={28} className="group-hover:rotate-90 transition-transform duration-300" />
                      </button>
                    )}

                  </div>

                  {/* МОДАЛЬНОЕ ОКНО "НОВОЕ ОБРАЩЕНИЕ" */}
                  {showNewRequestModal && (
                    <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
                      <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden ring-1 ring-slate-200 dark:ring-slate-800 transform scale-100 animate-in zoom-in-95 duration-200">
                        <div className="bg-slate-50 dark:bg-slate-950 px-8 py-6 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
                          <h2 className="text-xs font-bold text-slate-900 dark:text-white uppercase tracking-widest flex items-center gap-2">
                            <div className="p-1.5 bg-amber-100 dark:bg-amber-500/20 text-amber-600 dark:text-amber-400 rounded-lg"><Icons.Plus size={16}/></div> Новое обращение
                          </h2>
                          <button onClick={() => setShowNewRequestModal(false)} className="text-slate-400 hover:text-slate-900 dark:hover:text-white bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 p-2 rounded-xl ring-1 ring-slate-200 dark:ring-slate-700 transition-all active:scale-95 shadow-sm"><Icons.X size={16} /></button>
                        </div>
                        <div className="p-8">
                          <p className="text-sm text-slate-500 dark:text-slate-400 mb-6 font-medium leading-relaxed">Откройте новую вкладку для входящего запроса. Ваш текущий прогресс будет сохранен.</p>
                          <label className="block text-[10px] font-bold text-slate-900 dark:text-white mb-3 uppercase tracking-widest">Выбор водителя</label>
                          
                          <div className="relative mb-0">
                            <Icons.Search className="absolute left-4 top-3.5 text-slate-400" size={16} />
                            <input 
                              type="text" 
                              placeholder="Поиск по имени или ID..." 
                              className="w-full pl-11 pr-4 py-3 bg-white dark:bg-slate-950 ring-1 ring-slate-200 dark:ring-slate-700 rounded-t-2xl text-sm font-semibold text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-shadow"
                              value={driverSearch}
                              onChange={e => setDriverSearch(e.target.value)}
                            />
                          </div>
                          <div className="w-full h-56 overflow-y-auto bg-slate-50/50 dark:bg-slate-900 border-x border-b border-slate-200 dark:border-slate-700 rounded-b-2xl p-2 mb-8 custom-scrollbar shadow-inner">
                            {filteredDrivers.map(d => (
                              <div 
                                key={d.id}
                                onClick={() => setSelectedDriverId(d.id)}
                                className={`py-3 px-4 mb-1 cursor-pointer rounded-xl text-sm font-semibold transition-all flex justify-between items-center ${
                                  selectedDriverId === d.id 
                                    ? 'bg-blue-600 text-white shadow-md transform scale-[0.98]' 
                                    : 'text-slate-700 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm'
                                }`}
                              >
                                <span>{d.name}</span>
                                <span className={`font-mono text-[10px] px-2 py-1 rounded-lg font-bold ${selectedDriverId === d.id ? 'bg-blue-700/50 text-blue-100' : 'bg-slate-200 dark:bg-slate-800 text-slate-500'}`}>
                                  {d.companyId}
                                </span>
                              </div>
                            ))}
                            {filteredDrivers.length === 0 && (
                              <div className="text-slate-400 dark:text-slate-500 italic px-4 py-8 text-center text-sm font-medium">Водитель не найден</div>
                            )}
                          </div>

                          <div className="flex gap-4">
                            <button onClick={() => handleStartRequest('message')} disabled={!selectedDriverId} className={`flex-1 py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-2 ${selectedDriverId ? 'bg-indigo-50 dark:bg-indigo-500/10 ring-1 ring-indigo-200 dark:ring-indigo-500/30 text-indigo-700 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 active:scale-95 shadow-sm' : 'bg-slate-50 dark:bg-slate-800/50 text-slate-400 dark:text-slate-600 ring-1 ring-slate-200 dark:ring-slate-800 cursor-not-allowed'}`}>
                              <Icons.MessageSquare size={16} /> Чат
                            </button>
                            <button onClick={() => handleStartRequest('call')} disabled={!selectedDriverId} className={`flex-1 py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-2 ${selectedDriverId ? 'bg-blue-600 hover:bg-blue-700 text-white active:scale-95 shadow-md shadow-blue-500/20' : 'bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-600 cursor-not-allowed ring-1 ring-slate-200 dark:ring-slate-700'}`}>
                              <Icons.Phone size={16} /> Звонок
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Модальное окно Эскалации */}
                  {showEscalateModal && (
                    <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
                      <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden ring-1 ring-slate-200 dark:ring-slate-800 transform scale-100 animate-in zoom-in-95 duration-200">
                        <div className="bg-slate-50 dark:bg-slate-950 px-8 py-6 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
                          <h2 className="text-xs font-bold text-slate-900 dark:text-white uppercase tracking-widest flex items-center gap-2">
                             <div className="p-1.5 bg-rose-100 dark:bg-rose-500/20 text-rose-600 dark:text-rose-400 rounded-lg"><Icons.AlertTriangle size={16}/></div> Эскалация запроса
                          </h2>
                          <button onClick={() => setShowEscalateModal(false)} className="text-slate-400 hover:text-slate-900 dark:hover:text-white bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 p-2 rounded-xl ring-1 ring-slate-200 dark:ring-slate-700 transition-all active:scale-95 shadow-sm"><Icons.X size={16} /></button>
                        </div>
                        <div className="p-8">
                          <p className="text-sm text-slate-500 dark:text-slate-400 mb-6 font-medium">Выберите специалиста или менеджера для передачи запроса.</p>
                          <div className="space-y-3 max-h-[400px] overflow-y-auto custom-scrollbar pr-2">
                            {EMPLOYEES.map((emp, idx) => (
                              <button key={idx} onClick={() => handleEscalate(emp)} className="w-full text-left px-5 py-4 ring-1 ring-slate-200 dark:ring-slate-700 rounded-2xl text-sm font-bold text-slate-700 dark:text-slate-300 hover:ring-blue-500 dark:hover:ring-blue-500 hover:bg-blue-50 dark:hover:bg-blue-500/10 transition-all shadow-sm hover:shadow-md flex items-center justify-between group">
                                {emp} 
                                <div className="p-1 rounded-lg bg-slate-100 dark:bg-slate-800 group-hover:bg-blue-100 dark:group-hover:bg-blue-500/20 transition-colors">
                                  <Icons.ChevronDown size={16} className="text-slate-400 dark:text-slate-500 group-hover:text-blue-600 dark:group-hover:text-blue-400 -rotate-90"/>
                                </div>
                              </button>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Модальное окно "Примечание к особому статусу" */}
                  {showApprovalNoteModal && (
                    <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
                      <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden ring-1 ring-slate-200 dark:ring-slate-800 transform scale-100 animate-in zoom-in-95 duration-200">
                        <div className="bg-amber-50 dark:bg-amber-500/10 px-8 py-6 border-b border-amber-200 dark:border-amber-500/20 flex justify-between items-center">
                          <h2 className="text-xs font-bold text-amber-700 dark:text-amber-500 uppercase tracking-widest flex items-center gap-2">
                            <div className="p-1.5 bg-amber-200 dark:bg-amber-500/20 text-amber-700 dark:text-amber-400 rounded-lg"><Icons.AlertTriangle size={16} /></div> Добавить примечание
                          </h2>
                          <button onClick={() => setShowApprovalNoteModal(false)} className="text-amber-500 hover:text-amber-800 dark:hover:text-amber-300 bg-amber-100/50 dark:bg-amber-500/20 hover:bg-amber-200 dark:hover:bg-amber-500/40 p-2 rounded-xl transition-all active:scale-95"><Icons.X size={16} /></button>
                        </div>
                        <div className="p-8">
                          <p className="text-sm text-slate-600 dark:text-slate-300 mb-5 font-medium leading-relaxed">
                            Укажите причину, по которой выбранным водителям назначен особый статус (например, "Не менять логбук без звонка").
                          </p>
                          <textarea
                            className="w-full bg-slate-50 dark:bg-slate-950 ring-1 ring-slate-200 dark:ring-slate-700 rounded-2xl p-5 text-sm font-medium text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-shadow resize-none shadow-inner"
                            rows="4"
                            placeholder="Введите примечание (необязательно)..."
                            value={approvalNoteInput}
                            onChange={(e) => setApprovalNoteInput(e.target.value)}
                            autoFocus
                          />
                          <div className="flex gap-4 mt-8">
                            <button onClick={() => setShowApprovalNoteModal(false)} className="flex-1 py-4 ring-1 ring-inset ring-slate-300 dark:ring-slate-700 text-slate-700 dark:text-slate-300 rounded-2xl text-[11px] font-bold uppercase tracking-widest hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors shadow-sm active:scale-95">Отмена</button>
                            <button onClick={handleConfirmApprovalNote} className="flex-1 bg-amber-500 hover:bg-amber-600 text-white rounded-2xl text-[11px] font-bold uppercase tracking-widest transition-all shadow-md active:scale-95 shadow-amber-500/20">Сохранить</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                  
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MotionELD />);
    </script>
</body>
</html>
