<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion ELD</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel для JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        slate: {
                            700: '#404040',
                            800: '#262626',
                            850: '#1f1f1f',
                            900: '#171717',
                            950: '#121212',
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 20px rgba(59, 130, 246, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Кастомный скроллбар для премиального вида */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #404040; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #525252; }
        
        /* Плавность для всего приложения */
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        /* Скрытие скролла, где он не нужен визуально, но нужен функционально */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased selection:bg-blue-200 dark:selection:bg-blue-900 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {

          Square: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>,

          AlertTriangle: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
          CheckCircle: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,

          Sidebar: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>,
          ChevronDown: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
          ChevronUp: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>,
          Grid: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>,
          List: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>,
          Moon: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>,
          Sun: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>,
          Search: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
          Clock: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
          Filter: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>,
          Phone: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,
          PhoneOff: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>,
          MessageSquare: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
          SortAsc: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5h10M11 9h7M11 13h4M3 7l3-3 3 3M6 6v14"/></svg>,
          SortDesc: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5h10M11 9h7M11 13h4M3 17l3 3 3-3M6 18V4"/></svg>,
          Coffee: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>,
          Tag: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>,
          Plus: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
          Users: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
          BarChart2: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>,
          Building: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>,
          Copy: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>,
          TrendingUp: ({ size = 18, className = "" }) => <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>,
        };

        const EMPLOYEES = [
          'Специалист 1-й линии', 
          'Старший диспетчер', 
          'Руководитель смены', 
          'Служба безопасности', 
          'Техническая поддержка',
          'Алексей С.',
          'Мария К.',
          'Игорь Н.',
          'Елена В.'
        ];

        const formatDurationText = (ms) => {
            const totalSecs = Math.floor(ms / 1000);
            const m = Math.floor(totalSecs / 60);
            const s = totalSecs % 60;
            return `${m}м ${s}с`;
        };

        const formatDurationSecs = (secs) => {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        const formatShiftDuration = (ms) => {
            const totalMins = Math.floor(ms / 1000 / 60);
            const h = Math.floor(totalMins / 60);
            const m = totalMins % 60;
            if (h === 0 && m === 0) return '0ч 00м';
            return `${h}ч ${m.toString().padStart(2, '0')}м`;
        };

        const groupLogsByDate = (logs) => {
            const groups = [];
            const dateMap = {};
            
            logs.forEach(log => {
                const d = log.date || 'Неизвестная дата';
                if (!dateMap[d]) {
                    dateMap[d] = [];
                    groups.push({ date: d, items: dateMap[d] });
                }
                dateMap[d].push(log);
            });
            
            return groups;
        };

        const LiveShiftTimer = ({ loginTimestamp, totalBreakTimeMs, isBreak, currentBreakStart }) => {
            const [elapsed, setElapsed] = useState(0);

            useEffect(() => {
                const updateTimer = () => {
                    const now = Date.now();
                    let breakMs = totalBreakTimeMs || 0;
                    if (isBreak && currentBreakStart) {
                        breakMs += (now - currentBreakStart);
                    }
                    const workMs = Math.max(0, (now - loginTimestamp) - breakMs);
                    setElapsed(Math.floor(workMs / 1000));
                };
                
                updateTimer();
                const interval = setInterval(updateTimer, 1000);
                return () => clearInterval(interval);
            }, [loginTimestamp, totalBreakTimeMs, isBreak, currentBreakStart]);

            const h = Math.floor(elapsed / 3600);
            const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            return <span>{h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`}</span>;
        };

        const LiveBreakTimer = ({ totalBreakTimeMs, isBreak, currentBreakStart }) => {
            const [elapsed, setElapsed] = useState(0);

            useEffect(() => {
                const updateTimer = () => {
                    const now = Date.now();
                    let breakMs = totalBreakTimeMs || 0;
                    if (isBreak && currentBreakStart) {
                        breakMs += (now - currentBreakStart);
                    }
                    setElapsed(Math.floor(breakMs / 1000));
                };
                
                updateTimer();
                const interval = setInterval(updateTimer, 1000);
                return () => clearInterval(interval);
            }, [totalBreakTimeMs, isBreak, currentBreakStart]);

            const h = Math.floor(elapsed / 3600);
            const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            return <span>{h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`}</span>;
        };

        const RequestTimer = ({ startTime, isEnded, finalDuration }) => {
            const [elapsed, setElapsed] = useState(isEnded ? finalDuration : Math.floor((Date.now() - startTime) / 1000));

            useEffect(() => {
                if (isEnded) {
                    setElapsed(finalDuration || 0);
                    return;
                }
                setElapsed(Math.floor((Date.now() - startTime) / 1000));
                const interval = setInterval(() => {
                    setElapsed(Math.floor((Date.now() - startTime) / 1000));
                }, 1000);
                return () => clearInterval(interval);
            }, [startTime, isEnded, finalDuration]);

            const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            return <span className="font-mono tracking-widest">{m}:{s}</span>;
        };

        const BreakTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);

            useEffect(() => {
                if (!startTime) return;
                setElapsed(Math.floor((Date.now() - startTime) / 1000));
                const interval = setInterval(() => {
                    setElapsed(Math.floor((Date.now() - startTime) / 1000));
                }, 1000);
                return () => clearInterval(interval);
            }, [startTime]);

            const h = Math.floor(elapsed / 3600);
            const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');

            return (
                <div className="text-5xl font-mono font-black text-amber-500 mb-4 tracking-tight drop-shadow-sm">
                    {h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`}
                </div>
            );
        };

        const CallTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    setElapsed(Math.floor((Date.now() - startTime) / 1000));
                }, 1000);
                return () => clearInterval(interval);
            }, [startTime]);

            const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            return <span className="font-mono tracking-widest">{m}:{s}</span>;
        };

        const EmployeeCard = ({ employee }) => {
           let rateColor = "bg-rose-50 text-rose-800 ring-rose-200 dark:bg-rose-500/10 dark:text-rose-400 dark:ring-rose-500/20"; // 20k
           let iconBadge = "⚠️";
           let barColor = "bg-rose-500 dark:bg-rose-400";
           
           if (employee.rate === 35000) { 
               rateColor = "bg-emerald-50 text-emerald-800 ring-emerald-200 dark:bg-emerald-500/10 dark:text-emerald-400 dark:ring-emerald-500/20"; 
               iconBadge = "🥇"; 
               barColor = "bg-emerald-500 dark:bg-emerald-400"; 
           }
           if (employee.rate === 30000) { 
               rateColor = "bg-blue-50 text-blue-800 ring-blue-200 dark:bg-blue-500/10 dark:text-blue-400 dark:ring-blue-500/20"; 
               iconBadge = "🥈"; 
               barColor = "bg-blue-500 dark:bg-blue-400"; 
           }
           if (employee.rate === 25000) { 
               rateColor = "bg-amber-50 text-amber-800 ring-amber-200 dark:bg-amber-500/10 dark:text-amber-400 dark:ring-amber-500/20"; 
               iconBadge = "🥉"; 
               barColor = "bg-amber-500 dark:bg-amber-400"; 
           }

           return (
             <div className="group bg-white dark:bg-slate-900 rounded-2xl p-5 ring-1 ring-slate-200 dark:ring-slate-800 shadow-sm hover:shadow-soft hover:ring-slate-300 dark:hover:ring-slate-700 transition-all duration-300 flex flex-col h-full">
               <div className="flex justify-between items-start mb-6">
                  <div className="flex items-center gap-3.5">
                     <div className="w-11 h-11 rounded-full bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-800 dark:to-slate-800/50 flex items-center justify-center text-slate-700 dark:text-slate-300 font-bold text-base ring-1 ring-slate-900/5 dark:ring-white/10 shadow-inner">
                        {employee.name.charAt(0)}
                     </div>
                     <div>
                        <h4 className="font-semibold text-slate-900 dark:text-slate-100 text-sm tracking-tight">{employee.name}</h4>
                        <span className="text-[10px] font-medium text-slate-500 dark:text-slate-400 uppercase tracking-widest mt-0.5 block">Диспетчер</span>
                     </div>
                  </div>
                  <div className={`px-2.5 py-1 rounded-full text-[11px] font-bold ring-1 whitespace-nowrap shadow-sm ${rateColor}`}>
                     {iconBadge} {employee.rate.toLocaleString('ru-RU')} 
                  </div>
               </div>

               <div className="grid grid-cols-2 gap-3 mb-5">
                  <div className="bg-slate-50/50 dark:bg-slate-800/30 p-3 rounded-xl ring-1 ring-slate-100 dark:ring-slate-800/50 flex flex-col">
                     <div className="flex items-center gap-1.5 text-slate-500 dark:text-slate-400 mb-1.5">
                        <Icons.MessageSquare size={14} className="text-indigo-500"/>

                let patrol = Math.floor(Math.random() * 20) + 70; // 70-90%

                    messages += 15;
                    calls += 5;
                    patrol = Math.floor(Math.random() * 5) + 95; // 95-100%

                    messages -= 10;

                const absent = isTop ? 0 : isBad ? Math.floor(Math.random() * 3) + 1 : 0;

              id: currentReq.id, driverName: currentReq.driver.name, companyName: currentReq.driver.company,
              actions: currentReq.actions.length > 0 ? [...currentReq.actions] : ['Без действий'],
              status: `Эскалация -> ${empName}`, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
              date: dateStr, timeSpent: timeSpentText, type: currentReq.type
            }, ...prev]);
            setShowEscalateModal(false);
            closeCurrentRequest();
          };

          const closeCurrentRequest = () => {
            const newRequests = activeRequests.filter(r => r.id !== currentRequestId);
            setActiveRequests(newRequests);
            setShowAntiFraudAlert(false);
            if (newRequests.length > 0) {
                setCurrentRequestId(newRequests[0].id);
                setActiveWorkspaceView('request');
            } else {
                setCurrentRequestId(null);
                setActiveWorkspaceView(activePatrol ? 'patrol' : 'idle');
            }
          };

          const startPatrolDirectly = (compId, isRepeat = false) => {
            setShowAntiFraudAlert(false);
            const company = COMPANIES.find(c => c.id === compId);
            let currentProg = patrolProgress[compId] || { rounds: 0, data: {} };
            if (isRepeat) {
                currentProg = { rounds: currentProg.rounds + 1, data: {} };
                setPatrolProgress(prev => ({ ...prev, [compId]: currentProg }));
            }
            setActivePatrol({ 
                id: `PAT-${Math.floor(Math.random() * 9000) + 1000}`, 
                company: company, startTime: Date.now(), accumulatedTime: 0, initialData: currentProg.data 
            });
            setPatrolData(currentProg.data); setPatrolCurrentPage(1); setLastSelectedIndex(null); 
            setPatrolDriverSearch(''); setFilterSensitive(false);
            setActiveWorkspaceView('patrol'); setActiveTab('workspace'); 
          };

          const handleToggleDriverSelect = (driverId, index, event, currentDrivers) => {
            setPatrolData(prev => {
              const isSelected = prev[driverId]?.selected || false;
              const newState = { ...prev };
              if (event.shiftKey && lastSelectedIndex !== null && currentDrivers) {
                const start = Math.min(lastSelectedIndex, index);
                const end = Math.max(lastSelectedIndex, index);
                for (let i = start; i <= end; i++) {
                  const id = currentDrivers[i].id;
                  if (!newState[id]) newState[id] = { selected: true, completed: false, fixes: [] };
                  else newState[id].selected = true;
                }
              } else {
                if (isSelected) newState[driverId] = { ...newState[driverId], selected: false };
                else {
                  if (!newState[driverId]) newState[driverId] = { selected: true, completed: false, fixes: [] };
                  else newState[driverId].selected = true;
                }
              }
              return newState;
            });
            setLastSelectedIndex(index);
          };

          const handleSelectAllDrivers = () => {
            if (!activePatrol) return;
            const companyDrivers = driversList.filter(d => d.companyId === activePatrol.company.id);
            const uncompleted = companyDrivers.filter(d => !patrolData[d.id]?.completed && !patrolData[d.id]?.inactive);
            
            const searchedUncompleted = uncompleted.filter(d => 
                (d.name.toLowerCase().includes(patrolDriverSearch.toLowerCase()) || 
                d.truck.toLowerCase().includes(patrolDriverSearch.toLowerCase())) &&
                (!filterSensitive || d.requiresApproval)
            );

            let currentPageDrivers = searchedUncompleted;
            if (itemsPerPage !== 'All') {
                const limit = parseInt(itemsPerPage, 10);
                const startIndex = (patrolCurrentPage - 1) * limit;
                currentPageDrivers = searchedUncompleted.slice(startIndex, startIndex + limit);
            }
            
            const allSelected = currentPageDrivers.length > 0 && currentPageDrivers.every(d => patrolData[d.id]?.selected);
            const newData = { ...patrolData };
            currentPageDrivers.forEach(d => {
                if (!newData[d.id]) newData[d.id] = { selected: !allSelected, completed: false, fixes: [] };
                else newData[d.id].selected = !allSelected; 
            });
            setPatrolData(newData); setLastSelectedIndex(null);
          };

          const handleToggleBulkFix = (fixText) => {
            const companyDrivers = driversList.filter(d => d.companyId === activePatrol.company.id);
            const selectedIds = companyDrivers.filter(d => patrolData[d.id]?.selected && !patrolData[d.id]?.completed && !patrolData[d.id]?.inactive).map(d => d.id);
            if (selectedIds.length === 0) return;
            setPatrolData(prev => {
                const newState = { ...prev };
                const allHaveFix = selectedIds.every(id => newState[id].fixes.includes(fixText));
                selectedIds.forEach(id => {
                    if (allHaveFix) newState[id].fixes = newState[id].fixes.filter(f => f !== fixText);
                    else if (!newState[id].fixes.includes(fixText)) newState[id].fixes = [...newState[id].fixes, fixText];
                });
                return newState;
            });
          };

          const handleMoveToCompleted = () => {
              setPatrolData(prev => {
                  const newState = { ...prev };
                  Object.keys(newState).forEach(id => {
                      if (newState[id].selected && !newState[id].completed && !newState[id].inactive) {
                          newState[id].completed = true; newState[id].selected = false;
                          if (newState[id].fixes.length === 0) newState[id].fixes = ['Checked'];
                      }
                  });
                  return newState;
              });
              setLastSelectedIndex(null);
          };

          const handleMarkInactive = () => {
              setPatrolData(prev => {
                  const newState = { ...prev };
                  Object.keys(newState).forEach(id => {
                      if (newState[id].selected && !newState[id].completed && !newState[id].inactive) {
                          newState[id].inactive = true; newState[id].selected = false; newState[id].fixes = []; 
                      }
                  });
                  return newState;
              });
              setLastSelectedIndex(null);
          };

          const handleEndPatrol = () => {
            const companyDrivers = driversList.filter(d => d.companyId === activePatrol.company.id);
            const totalDriversCount = companyDrivers.length;
            const newlyCompletedData = Object.entries(patrolData)
              .filter(([id, data]) => data.completed && !activePatrol.initialData[id]?.completed)
              .map(([id, data]) => ({ driverName: driversList.find(d => d.id === id)?.name || id, fixes: [...data.fixes] }));

            const newlyInactiveData = Object.entries(patrolData)
              .filter(([id, data]) => data.inactive && !activePatrol.initialData[id]?.inactive)
              .map(([id, data]) => ({ driverName: driversList.find(d => d.id === id)?.name || id, fixes: ['В отгуле / Не работает'] }));

            const allProcessed = [...newlyCompletedData, ...newlyInactiveData];
            const finalTimeMs = (activePatrol.accumulatedTime || 0) + (activePatrol.startTime ? (Date.now() - activePatrol.startTime) : 0);

            if (allProcessed.length === 0 && finalTimeMs < 5000) { 
                setAntiFraudAlertMsg('Действия не зафиксированы. Проверьте хотя бы одного водителя.');
                setShowAntiFraudAlert(true); 
                return; 
            }

            setPatrolProgress(prev => {
                const existing = prev[activePatrol.company.id] || { rounds: 0, data: {} };
                return { ...prev, [activePatrol.company.id]: { ...existing, data: patrolData } };
            });

            const totalCheckedNow = Object.values(patrolData).filter(d => d.completed || d.inactive).length;
            const percentage = totalDriversCount > 0 ? Math.round((totalCheckedNow / totalDriversCount) * 100) : 100;
            const dateStr = new Date().toLocaleDateString('ru-RU', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });

            if (allProcessed.length > 0 || finalTimeMs > 30000) {
                setPatrolHistoryLog(prev => [{
                  id: activePatrol.id, companyName: activePatrol.company.name, actions: allProcessed,
                  time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                  date: dateStr, timeSpent: formatDurationText(finalTimeMs), rawTimeMs: finalTimeMs,
                  completedAt: Date.now(), stats: { checked: totalCheckedNow, total: totalDriversCount, percent: percentage, inactive: newlyInactiveData.length }
                }, ...prev]);
            }

            const patrolFixesLogs = newlyCompletedData
              .filter(data => !(data.fixes.length === 1 && data.fixes[0] === 'Checked'))
              .map((data) => ({
                id: `PAT-FIX-${Math.floor(Math.random() * 90000)}`, driverName: data.driverName, companyName: activePatrol.company.name,
                actions: data.fixes, status: 'Проверен', time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                date: dateStr, timeSpent: formatDurationText(finalTimeMs / (newlyCompletedData.length || 1)), type: 'patrol_fix'
              }));

            if (patrolFixesLogs.length > 0) setHistoryLog(prev => [...patrolFixesLogs, ...prev]);
            
            setActivePatrol(null); setPatrolData({}); setPatrolDriverSearch('');
            setActiveWorkspaceView(activeRequests.length > 0 ? 'request' : 'idle');
          };

          const togglePatrolHistory = (id) => setExpandedPatrols(prev => ({ ...prev, [id]: !prev[id] }));

          const handleToggleApprovalStatus = () => {
              if (!activePatrol) return;
              const companyDrivers = driversList.filter(d => d.companyId === activePatrol.company.id);
              const selectedDrivers = companyDrivers.filter(d => patrolData[d.id]?.selected && !patrolData[d.id]?.completed && !patrolData[d.id]?.inactive);
              if (selectedDrivers.length === 0) return;
              const allRequireApproval = selectedDrivers.every(d => d.requiresApproval);
              
              if (!allRequireApproval) {
                  setApprovalNoteInput(''); setShowApprovalNoteModal(true);
              } else {
                  setDriversList(prev => prev.map(d => {
                      if (selectedDrivers.some(sd => sd.id === d.id)) return { ...d, requiresApproval: false, approvalNote: '' };
                      return d;
                  }));
              }
          };

          const handleConfirmApprovalNote = () => {
              const companyDrivers = driversList.filter(d => d.companyId === activePatrol.company.id);
              const selectedDrivers = companyDrivers.filter(d => patrolData[d.id]?.selected && !patrolData[d.id]?.completed && !patrolData[d.id]?.inactive);
              setDriversList(prev => prev.map(d => {
                  if (selectedDrivers.some(sd => sd.id === d.id)) return { ...d, requiresApproval: true, approvalNote: approvalNoteInput };
                  return d;
              }));
              setShowApprovalNoteModal(false); setApprovalNoteInput('');
          };

          const HistoryCard = ({ log }) => (
            <div className="bg-white dark:bg-slate-900 p-5 rounded-2xl ring-1 ring-slate-200 dark:ring-slate-800 shadow-sm hover:shadow-md transition-shadow flex flex-col gap-3">
               <div className="flex justify-between items-start">
                  <div className="font-semibold text-sm text-slate-900 dark:text-slate-100 leading-tight">{log.driverName}</div>
                  <span className="text-[10px] text-slate-400 font-mono shrink-0 bg-slate-50 dark:bg-slate-800 px-2 py-0.5 rounded-md border border-slate-100 dark:border-slate-700/50 ml-2">{log.time}</span>
               </div>
               {log.companyName && (
                  <div className="text-[10px] font-medium text-slate-500 dark:text-slate-400 flex items-center gap-1.5 -mt-1.5">
                     <Icons.Building size={12} className="text-slate-400" /> <span className="truncate">{log.companyName}</span>
                  </div>
               )}
               {log.timeSpent && (
                  <div className="text-[10px] font-bold text-blue-700 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 px-2.5 py-1.5 rounded-lg self-start flex items-center gap-1.5 mt-1">
                     <Icons.Clock size={12} /> Затрачено: {log.timeSpent}
                  </div>
               )}
               <div className="flex flex-wrap gap-1.5 mt-1.5">
                  {log.actions.map((act, i) => (
                     <span key={i} className="px-2.5 py-1.5 bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-[10px] font-medium ring-1 ring-slate-200/50 dark:ring-slate-700/50">{act}</span>
                  ))}
               </div>
               <div className="flex justify-between items-center mt-3 pt-3 border-t border-slate-100 dark:border-slate-800/50">
                  <span className="font-mono text-[9px] text-slate-400 dark:text-slate-500 bg-slate-50 dark:bg-slate-800 px-1.5 py-0.5 rounded border border-slate-100 dark:border-slate-700">{log.id}</span>
                  <span className={`px-2.5 py-1 rounded-full text-[9px] font-bold uppercase tracking-wider shadow-sm ring-1 ${
                    log.status.includes('Эскалация') ? 'bg-amber-50 text-amber-700 ring-amber-200 dark:bg-amber-500/10 dark:text-amber-400 dark:ring-amber-500/20' : 
                    'bg-emerald-50 text-emerald-700 ring-emerald-200 dark:bg-emerald-500/10 dark:text-emerald-400 dark:ring-emerald-500/20'
                  }`}>
                     {log.status.split('->')[0]}
                  </span>
               </div>
            </div>
          );

          const filteredDrivers = driversList.filter(d => d.name.toLowerCase().includes(driverSearch.toLowerCase()) || d.truck.toLowerCase().includes(driverSearch.toLowerCase()));
          const filteredCompanies = COMPANIES.filter(c => c.name.toLowerCase().includes(companySearch.toLowerCase()));
          const myCompanies = filteredCompanies.filter(c => assignedCompanyIds.includes(c.id));
          const currentReq = activeRequests.find(r => r.id === currentRequestId);

          const activeShiftLog = attendanceLogs.find(l => l.status === 'Активен');
          const targetDateStr = activeShiftLog ? activeShiftLog.date : todayDateStr;

          const currentShiftPatrols = activeShiftLog 
             ? patrolHistoryLog.filter(log => log.completedAt >= activeShiftLog.loginTimestamp)
             : patrolHistoryLog.filter(log => log.date === targetDateStr);

          const currentShiftRequests = historyLog.filter(log => log.date === targetDateStr);

          let totalBasePercent = 0; let totalBonusPercent = 0;
          myCompanies.forEach(company => {
              const prog = patrolProgress[company.id];
              if (prog) {
                  const companyDriversCount = driversList.filter(d => d.companyId === company.id).length;
                  const checkedCount = Object.values(prog.data).filter(d => d.completed || d.inactive).length;
                  const currentPercent = companyDriversCount > 0 ? Math.round((checkedCount / companyDriversCount) * 100) : 0;
                  if (prog.rounds > 0) {
                      totalBasePercent += 100; totalBonusPercent += (prog.rounds - 1) * 100 + currentPercent;
                  } else {
                      totalBasePercent += currentPercent;
                  }
              }
          });

          const myCompaniesCount = myCompanies.length || 1;
          const basePatrolPercent = Math.round(totalBasePercent / myCompaniesCount);
          const bonusPatrolPercent = Math.round(totalBonusPercent / myCompaniesCount);

          const totalPatrolTimeMs = currentShiftPatrols.reduce((acc, log) => acc + (log.rawTimeMs || 0), 0);
          const messagesCount = currentShiftRequests.filter(l => l.type === 'message').length;
          const callsCount = currentShiftRequests.filter(l => l.type === 'call').length;
          const fixesCount = currentShiftRequests.filter(l => l.type === 'patrol_fix').length;
          const totalRequestsCount = historyLog.length;
          const requestsByDate = groupLogsByDate(historyLog);

          const getSortedEmployees = (shiftName) => {
              const shiftEmployees = MOCK_EMPLOYEES.filter(e => e.shift === shiftName);
              if (employeeSort === 'default') return shiftEmployees;
              return [...shiftEmployees].sort((a, b) => {
                  if (employeeSort === 'best') {
                      if (b.rate !== a.rate) return b.rate - a.rate;
                      if (b.metrics.patrolPercent !== a.metrics.patrolPercent) return b.metrics.patrolPercent - a.metrics.patrolPercent;
                      return b.metrics.totalReqs - a.metrics.totalReqs;
                  } else {
                      if (a.rate !== b.rate) return a.rate - b.rate;
                      if (a.metrics.patrolPercent !== b.metrics.patrolPercent) return a.metrics.patrolPercent - b.metrics.patrolPercent;
                      return a.metrics.totalReqs - b.metrics.totalReqs;
                  }
              });
          };

          return (
            <div className={`${isDarkMode ? 'dark' : ''} h-full`}>
              <div className="min-h-screen flex font-sans h-screen overflow-hidden text-slate-900 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 transition-colors duration-500">
                
                {/* ЛЕВАЯ ПАНЕЛЬ (SIDEBAR) */}
                <div className={`${leftSidebarOpen ? 'w-[260px]' : 'w-0'} bg-white dark:bg-slate-900 border-r border-slate-200/60 dark:border-slate-800/60 flex flex-col shrink-0 transition-all duration-300 overflow-hidden z-30 relative`}>
                  <div className="w-[260px] h-full flex flex-col relative">
                    <div className="p-6 pb-4 flex items-center gap-3.5 shrink-0">
                      <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-[0_4px_14px_rgba(37,99,235,0.4)]">
                        <Icons.Activity size={20} />
                      </div>
                      <span className="font-bold text-xl tracking-tight text-slate-900 dark:text-white">Motion ELD</span>
                    </div>
                    
                    <div className="px-4 py-2 space-y-1.5 shrink-0 mt-2 overflow-y-auto custom-scrollbar flex-1">
                      <div className="text-[11px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest px-3 mb-4 mt-2">Меню</div>
                      
                      {[
                        { id: 'workspace', icon: <Icons.Square size={18} />, label: 'Рабочее место' },
                        { id: 'history', icon: <Icons.History size={18} />, label: 'История' },
                        { id: 'attendance', icon: <Icons.Clock size={18} />, label: 'Журнал прихода' },
                        { id: 'companies', icon: <Icons.Building size={18} />, label: 'Компании' },
                        { id: 'employees', icon: <Icons.Users size={18} />, label: 'Сотрудники' },
                      ].map(item => (
                         <button 
                            key={item.id}
                            onClick={() => setActiveTab(item.id)} 
                            className={`w-full flex items-center gap-3.5 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 ${
                              activeTab === item.id 
                                ? 'bg-blue-50 text-blue-700 dark:bg-blue-600/10 dark:text-blue-400 shadow-sm ring-1 ring-inset ring-blue-500/20' 
                                : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 hover:text-slate-900 dark:hover:text-slate-200'
                            }`}
                         >
                           {item.icon} {item.label}
                         </button>
                      ))}
                    </div>

                    <div className="mt-auto shrink-0 flex flex-col p-4">
                      <div className="p-5 rounded-2xl ring-1 ring-inset ring-slate-200 dark:ring-slate-800 bg-slate-50/50 dark:bg-slate-800/20 shadow-sm relative overflow-hidden">
                          {/* Акцентный фон для смены */}
                          {shiftState === 'Active' && <div className="absolute top-0 left-0 right-0 h-1 bg-emerald-500"></div>}
                          {shiftState === 'Break' && <div className="absolute top-0 left-0 right-0 h-1 bg-amber-500"></div>}
                          {shiftState === 'Offline' && <div className="absolute top-0 left-0 right-0 h-1 bg-slate-300 dark:bg-slate-700"></div>}

                          <div className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">Статус терминала</div>
                          
                          {shiftState === 'Offline' ? (
                            <div className="text-sm font-medium text-slate-500 dark:text-slate-400 p-3 bg-white dark:bg-slate-900 rounded-xl ring-1 ring-slate-200 dark:ring-slate-800 text-center shadow-sm">Офлайн</div>
                          ) : shiftState === 'Break' ? (
                            <div className="flex items-center gap-3 bg-white dark:bg-slate-900 p-3 rounded-xl ring-1 ring-amber-200 dark:ring-amber-500/30 shadow-sm">
                                <span className="relative flex h-2.5 w-2.5 shrink-0"><span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-amber-500"></span></span>
                                <div className="min-w-0">
                                  <div className="text-amber-600 dark:text-amber-500 font-bold text-[11px] uppercase tracking-wider">Перерыв</div>
                                  <div className="text-slate-500 dark:text-slate-400 text-[10px] mt-0.5 truncate">Приостановлено</div>
                                </div>
                            </div>
                          ) : (
                            <div className="flex items-center gap-3 bg-white dark:bg-slate-900 p-3 rounded-xl ring-1 ring-emerald-200 dark:ring-emerald-500/30 shadow-sm">
                                <span className="relative flex h-2.5 w-2.5 shrink-0"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-500 opacity-50"></span><span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span></span>
                                <div className="min-w-0">
                                  <div className="text-emerald-600 dark:text-emerald-500 font-bold text-[11px] uppercase tracking-wider">На смене</div>
                                  <div className="text-slate-500 dark:text-slate-400 text-[10px] mt-0.5 truncate" title={currentShift}>{currentShift}</div>
                                </div>
                            </div>
                          )}
                          
                          {/* ЖИВЫЕ ТАЙМЕРЫ */}
                          {shiftState !== 'Offline' && attendanceLogs.length > 0 && attendanceLogs[0].status === 'Активен' && (
                              <div className="mt-4 space-y-2">
                                 <div className="flex justify-between items-center text-[10px] font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">
                                     <span className="flex items-center gap-1.5"><Icons.Play size={12} className="text-blue-500"/> В работе</span>
                                     <span className="font-mono font-bold text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-900 px-2.5 py-1 rounded-lg ring-1 ring-slate-200 dark:ring-slate-800 shadow-sm">
                                        <LiveShiftTimer loginTimestamp={attendanceLogs[0].loginTimestamp} totalBreakTimeMs={attendanceLogs[0].totalBreakTimeMs} isBreak={shiftState === 'Break'} currentBreakStart={attendanceLogs[0].currentBreakStart} />
                                     </span>
                                 </div>
                                 <div className="flex justify-between items-center text-[10px] font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">
                                     <span className="flex items-center gap-1.5"><Icons.Coffee size={12} className="text-amber-500"/> Отдых</span>
                                     <span className="font-mono font-bold text-amber-700 dark:text-amber-400 bg-amber-50 dark:bg-amber-500/10 px-2.5 py-1 rounded-lg ring-1 ring-amber-200/50 dark:ring-amber-500/20 shadow-sm">
                                        <LiveBreakTimer totalBreakTimeMs={attendanceLogs[0].totalBreakTimeMs} isBreak={shiftState === 'Break'} currentBreakStart={attendanceLogs[0].currentBreakStart} />
                                     </span>
                                 </div>
                              </div>
                          )}
                      </div>
                      
                      <div className="mt-4 p-3 rounded-2xl flex items-center gap-3 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-800 transition-colors cursor-pointer shadow-sm">
                          <div className="w-10 h-10 rounded-full bg-gradient-to-br from-blue-100 to-blue-200 dark:from-blue-900 dark:to-blue-800 text-blue-700 dark:text-blue-300 flex items-center justify-center font-bold text-sm shrink-0 ring-1 ring-white/50 dark:ring-white/10 shadow-inner">ТС</div>
                          <div className="truncate">
                              <div className="text-sm font-semibold text-slate-900 dark:text-slate-100 truncate">Сотрудник Д.</div>
                              <div className="text-[10px] text-slate-500 dark:text-slate-400 uppercase tracking-widest truncate mt-0.5">Диспетчер 1-й линии</div>
                          </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* ОСНОВНОЙ КОНТЕЙНЕР (ЦЕНТР) */}
                <div className="flex-1 flex flex-col relative overflow-hidden bg-slate-50/50 dark:bg-slate-950">
                  
                  {/* ВЕРХНЯЯ ПАНЕЛЬ (HEADER) */}
                  <header className="h-16 bg-white/70 dark:bg-slate-950/70 border-b border-slate-200/60 dark:border-slate-800/60 flex items-center justify-between px-6 shrink-0 z-20 backdrop-blur-xl transition-all">
                    <div className="flex items-center gap-4">
                      <button onClick={() => setLeftSidebarOpen(!leftSidebarOpen)} className="p-2 text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all active:scale-95"><Icons.Sidebar size={20} /></button>
                      <h1 className="text-sm font-semibold text-slate-800 dark:text-slate-200 tracking-tight">
                        {activeTab === 'workspace' ? 'Рабочее пространство' : 
                         activeTab === 'history' ? 'История обращений' :
